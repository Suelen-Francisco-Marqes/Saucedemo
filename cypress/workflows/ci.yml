name: End-to-end tests
on: push:
name: Relatorio

on:
  push:
  workflow_dispatch:

jobs:
  gerar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python relatorio.py